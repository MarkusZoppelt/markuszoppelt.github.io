<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markus Zoppelt</title>
    <meta name="description" content="Software Engineer at Helsing | PhD | Go, Rust | 8 years in security">
    <link rel="icon" href="static/favicon.ico">
    <link rel="stylesheet" href="static/inter.css">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --color-background: #ffffff;
        --color-foreground: #0f172a;
        --color-muted: #64748b;
        --color-border: #e2e8f0;
        --color-surface: #f8fafc;
        --color-accent: #0f172a;
        --font-size-lg: 1.125rem;
        --font-size-xl: 1.25rem;
        --font-size-3xl: 1.875rem;
        --font-size-4xl: 2.25rem;
        --line-height-tight: 1.25;
        --line-height-normal: 1.5;
        --line-height-relaxed: 1.625;
      }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-weight: 450;
        line-height: var(--line-height-normal);
        color: var(--color-foreground);
        background-color: var(--color-background);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 2rem;
        width: 100%;
      }

      .hero {
        padding: 2rem 0;
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, rgba(248, 250, 252, 0.8) 0%, rgba(241, 245, 249, 0.4) 100%);
      }

      @media (min-width: 768px) {
        .hero {
          padding: 6rem 0;
        }
      }

      @media (min-width: 1024px) {
        .hero {
          padding: 8rem 0;
        }
      }

      .profile-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        width: 100%;
        max-width: 900px;
        margin: 0 auto;
        backdrop-filter: blur(10px);
        border-radius: 24px;
        padding: 1.5rem;
        background: rgba(255, 255, 255, 0.6);
        border: 1px solid rgba(226, 232, 240, 0.2);
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      }

      @media (min-width: 768px) {
        .profile-section {
          padding: 2rem;
        }
      }

      @media (min-width: 1024px) {
        .profile-section {
          flex-direction: row;
          text-align: left;
          align-items: flex-start;
          gap: 3rem;
        }
      }

      .profile-image {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        object-fit: cover;
        margin-bottom: 1.5rem;
        border: 3px solid var(--color-border);
        box-shadow: 0 10px 25px -3px rgba(15, 23, 42, 0.1), 0 4px 6px -2px rgba(15, 23, 42, 0.05);
      }

      @media (min-width: 768px) {
        .profile-image {
          width: 140px;
          height: 140px;
          margin-bottom: 2rem;
        }
      }

      @media (min-width: 1024px) {
        .profile-image {
          width: 160px;
          height: 160px;
          margin-bottom: 0;
        }
      }

      .profile-content {
        flex: 1;
      }

      .profile-title {
        font-size: var(--font-size-3xl);
        font-weight: 700;
        line-height: var(--line-height-tight);
        letter-spacing: -0.025em;
        margin-bottom: 0.75rem;
        color: var(--color-foreground);
      }

      @media (min-width: 768px) {
        .profile-title {
          font-size: var(--font-size-4xl);
        }
      }

      @media (min-width: 1024px) {
        .profile-title {
          font-size: 3rem;
        }
      }

      .profile-subtitle {
        font-size: var(--font-size-lg);
        color: var(--color-muted);
        margin-bottom: 2rem;
        font-weight: 500;
      }

      @media (min-width: 768px) {
        .profile-subtitle {
          font-size: var(--font-size-xl);
        }
      }

      .profile-description {
        font-size: var(--font-size-lg);
        line-height: var(--line-height-relaxed);
        color: var(--color-muted);
        max-width: 600px;
        margin: 0 auto;
      }

      @media (min-width: 1024px) {
        .profile-description {
          max-width: none;
          margin: 0;
        }
      }

      .contact-links {
        display: flex;
        justify-content: center;
        gap: 1rem;
        margin-top: 2rem;
      }

      @media (min-width: 1024px) {
        .contact-links {
          justify-content: flex-start;
        }
      }

      .contact-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.75rem;
        background-color: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: 50%;
        text-decoration: none;
        color: var(--color-muted);
        transition: all 0.3s ease;
        width: 48px;
        height: 48px;
      }

      .contact-link:hover {
        border-color: var(--color-accent);
        background-color: var(--color-accent);
        color: var(--color-background);
        transform: translateY(-2px);
        box-shadow: 0 8px 16px -4px rgba(15, 23, 42, 0.25);
      }

      .contact-link svg {
        width: 20px;
        height: 20px;
        transition: all 0.3s ease;
      }

      .contact-link:hover svg {
        transform: scale(1.1);
      }

      .company-link {
        color: var(--color-foreground);
        text-decoration: none;
        border-bottom: 2px solid var(--color-accent);
        transition: all 0.3s ease;
        font-weight: 600;
      }

      .company-link:hover {
        color: var(--color-accent);
        border-bottom-color: transparent;
      }
    </style>
</head>
<body>
  <main>
    <section class="hero">
      <div class="container">
        <div class="profile-section">
          <img src="static/hero.jpg" alt="Markus Zoppelt" class="profile-image">
          <div class="profile-content">
            <h1 class="profile-title">Markus Zoppelt</h1>
            <p class="profile-subtitle">Software Engineer at <a href="https://helsing.ai" class="company-link">Helsing</a></p>
            <p class="profile-description">
              Building secure, high-performance software systems in Rust and Go.

              Experienced with security engineering, cryptography, and developing
              resilient infrastructure for mission-critical applications.
            </p>

              </a>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
